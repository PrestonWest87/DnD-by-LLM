<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI VTT Engine - D&D 5e</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; margin: 0; background: #121212; color: #e0e0e0; }
        .screen { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; flex-direction: column; }
        .active-screen { display: flex; }
        
        .menu-box { background: #1e1e1e; padding: 30px; border-radius: 8px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .small-box { width: 350px; } .large-box { width: 650px; max-height: 90vh; overflow-y: auto;}
        
        input[type="text"], input[type="password"], input[type="file"], input[type="number"], textarea, select { 
            width: 100%; margin-bottom: 10px; padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box;
        }
        button { width: 100%; padding: 10px; background: #4facfe; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
        button:hover { background: #00f2fe; color: black;}

        .camp-list-item { background: #2c2c2c; padding: 10px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #4facfe;}
        .camp-badge { background: #111; padding: 3px 8px; border-radius: 10px; font-size: 11px; color: #ccc;}

        /* Character Sheet Grid Updates */
        .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; margin-bottom: 15px;}
        .attr-row { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #444;}
        .attr-label { width: 40px; font-weight: bold; color: #aaa;}
        .attr-input { width: 60px; margin: 0; padding: 5px; text-align: center; background: #444; color: white; border: 1px solid #555; border-radius: 3px;}
        .attr-result { width: 50px; text-align: center; font-size: 16px; font-weight: bold; color: #4facfe;}
        .attr-mod { width: 40px; text-align: right; font-size: 14px; color: #a8e6cf;}
        
        .gen-methods { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 5px;}
        .gen-btn { background: #333; font-size: 11px; padding: 5px;}
        .gen-btn.active { background: #e67e22;}

        .derived-stats { display: flex; justify-content: space-around; background: #181818; padding: 15px; border-radius: 4px; border: 1px solid #333; margin-bottom: 15px;}
        .d-stat { text-align: center;}
        .d-val { font-size: 24px; font-weight: bold; color: #fff;}
        .d-lbl { font-size: 11px; color: #888; text-transform: uppercase;}

        #vtt-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        .panel { padding: 20px; border-right: 1px solid #333; overflow-y: auto; }
        #left-panel { width: 280px; background: #1e1e1e; }
        #center-panel { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #181818; }
        #right-panel { width: 350px; background: #1e1e1e; display: flex; flex-direction: column; }
        
        canvas { background: #2b2b2b; border: 2px solid #555; cursor: grab; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .char-card { background: #2c2c2c; padding: 12px; margin-bottom: 12px; border-radius: 5px; border-left: 4px solid #3498db; font-size: 13px; position: relative;}
        .char-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px;}
        .char-card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; text-align: center; font-size: 11px; color: #ccc;}
        .stat-badge { background: #111; padding: 3px; border-radius: 3px; border: 1px solid #444;}
        .ready-badge { position: absolute; top: -5px; right: -5px; background: #2ecc71; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 20px; font-weight: bold; display: none;}
        
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 10px; background: #000; border-radius: 5px; margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
        .msg-user { color: #4facfe; margin-bottom: 8px; }
        .msg-ai { color: #a8e6cf; margin-bottom: 8px; }
        .msg-party { color: #f1c40f; margin-bottom: 8px; font-style: italic; }
        
        /* Dice Tray Styles */
        .dice-tray { background: #222; padding: 10px; border-radius: 4px; border: 1px solid #444; margin-bottom: 10px;}
        .dice-btn-group { display: flex; gap: 5px; margin-bottom: 5px; justify-content: space-between;}
        .dice-btn { background: #8e44ad; width: auto; padding: 5px 8px; font-size: 12px; margin: 0; flex-grow: 1;}
        .dice-btn:hover { background: #9b59b6;}
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active-screen">
        <div class="menu-box small-box">
            <h2>Welcome to the VTT</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="register()" style="background: #2c3e50;">Register</button>
            <div id="auth-msg" style="color: #e74c3c; margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="menu-box small-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="margin: 0;">Your Campaigns</h2>
                <button onclick="logout()" style="width: auto; background: #c0392b; padding: 6px 12px; font-size: 12px; margin: 0;">Log Out</button>
            </div>
            
            <div id="dashboard-list" style="text-align: left; margin-bottom: 20px; max-height: 200px; overflow-y: auto;"></div>

            <hr style="border-color: #333; margin-bottom: 15px;">
            <input type="text" id="new-camp-name" placeholder="New Campaign Name">
            <select id="new-camp-dm" style="margin-bottom: 10px;">
                <option value="ai">🤖 AI Dungeon Master</option>
                <option value="human">🧙‍♂️ I will be the Dungeon Master</option>
            </select>
            <button onclick="createCampaign()">Create Campaign</button>
            
            <hr style="border-color: #333; margin: 15px 0;">
            <h3 style="margin-top:0;">Join an Existing Game</h3>
            <input type="text" id="join-camp-code" placeholder="Enter Invite Code (e.g. a1b2c3d4)">
            <button onclick="joinCampaign()" style="background: #e67e22;">Join Campaign</button>

            <hr style="border-color: #333; margin: 15px 0;">
            <h4 style="margin-top:0; color:#aaa;">Upload SRD/Rulebook (PDF/TXT)</h4>
            <input type="file" id="rule-file" accept=".txt,.pdf">
            <button onclick="uploadRules()" style="background: #8e44ad; font-size: 12px; padding: 8px;">Upload to AI Memory</button>
            <div id="lobby-msg" style="color: #e74c3c; margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="char-screen" class="screen">
        <div class="menu-box large-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin-top: 0;">D&D 5e Character Creator</h2>
                <button onclick="loadDashboard()" style="width: auto; background: #444; padding: 6px 12px; font-size: 12px; margin: 0; margin-top: -15px;">Cancel</button>
            </div>
            
            <div class="sheet-grid">
                <div>
                    <label style="font-size: 12px; color: #888;">Identity</label>
                    <input type="text" id="char-name" placeholder="Character Name">
                    
                    <div style="display: flex; gap: 10px;">
                        <div style="flex-grow: 1;">
                            <label style="font-size: 12px; color: #888;">Race</label>
                            <select id="char-race" onchange="calcStats()">
                                <option value="Human">Human (+1 All)</option>
                                <option value="Elf">Elf (+2 DEX)</option>
                                <option value="Dwarf">Dwarf (+2 CON)</option>
                                <option value="Halfling">Halfling (+2 DEX)</option>
                                <option value="Dragonborn">Dragonborn (+2 STR, +1 CHA)</option>
                                <option value="Tiefling">Tiefling (+2 CHA, +1 INT)</option>
                                <option value="Orc">Half-Orc (+2 STR, +1 CON)</option>
                            </select>
                        </div>
                        <div style="flex-grow: 1;">
                            <label style="font-size: 12px; color: #888;">Class</label>
                            <select id="char-class" onchange="calcStats()">
                                <option value="Barbarian">Barbarian (d12)</option>
                                <option value="Bard">Bard (d8)</option>
                                <option value="Cleric">Cleric (d8)</option>
                                <option value="Druid">Druid (d8)</option>
                                <option value="Fighter">Fighter (d10)</option>
                                <option value="Monk">Monk (d8)</option>
                                <option value="Paladin">Paladin (d10)</option>
                                <option value="Ranger">Ranger (d10)</option>
                                <option value="Rogue">Rogue (d8)</option>
                                <option value="Sorcerer">Sorcerer (d6)</option>
                                <option value="Warlock">Warlock (d8)</option>
                                <option value="Wizard">Wizard (d6)</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <div style="flex-grow: 1;">
                            <label style="font-size: 12px; color: #888;">Background</label>
                            <select id="char-background">
                                <option value="Acolyte">Acolyte</option>
                                <option value="Criminal">Criminal</option>
                                <option value="Folk Hero">Folk Hero</option>
                                <option value="Noble">Noble</option>
                                <option value="Sage">Sage</option>
                                <option value="Soldier">Soldier</option>
                            </select>
                        </div>
                        <div style="flex-grow: 1;">
                            <label style="font-size: 12px; color: #888;">Alignment</label>
                            <select id="char-alignment">
                                <option value="Lawful Good">Lawful Good</option>
                                <option value="Neutral Good">Neutral Good</option>
                                <option value="Chaotic Good">Chaotic Good</option>
                                <option value="True Neutral">True Neutral</option>
                                <option value="Chaotic Neutral">Chaotic Neutral</option>
                                <option value="Lawful Evil">Lawful Evil</option>
                                <option value="Chaotic Evil">Chaotic Evil</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom:5px;">
                        <label style="font-size: 12px; color: #888;">Ability Scores</label>
                        <div class="gen-methods">
                            <button class="gen-btn active" id="btn-std" onclick="setGenMethod('std')">Standard Array</button>
                            <button class="gen-btn" id="btn-roll" onclick="setGenMethod('roll')">Roll 4d6</button>
                            <button class="gen-btn" id="btn-man" onclick="setGenMethod('man')">Manual</button>
                        </div>
                    </div>
                    <div id="attr-container"></div>
                </div>
            </div>

            <div class="derived-stats">
                <div class="d-stat"><div class="d-val" id="disp-hp">10</div><div class="d-lbl">Max HP</div></div>
                <div class="d-stat"><div class="d-val" id="disp-ac">10</div><div class="d-lbl">Armor Class</div></div>
                <div class="d-stat"><div class="d-val">+2</div><div class="d-lbl">Proficiency</div></div>
                <div class="d-stat"><div class="d-val" id="disp-init">+0</div><div class="d-lbl">Initiative</div></div>
            </div>

            <textarea id="char-backstory" placeholder="Backstory & Inventory: Detail your starting weapons, armor, tools, and personal history here so the AI DM knows what you are carrying..." style="height: 80px;"></textarea>
            <button onclick="submitCharacter()" style="background: #2ecc71; font-size: 16px;">Finalize & Enter Campaign</button>
            <div id="char-msg" style="color: #e74c3c; margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="vtt-screen">
        <div id="left-panel" class="panel">
            <button onclick="loadDashboard()" style="background: #444; font-size: 12px; margin-bottom: 15px; padding: 6px;">⬅ Back to Campaigns</button>
            
            <div id="dm-controls" style="display: none; background: #2c0e0e; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #e74c3c;">
                <h4 style="margin:0 0 10px 0; color: #e74c3c;">DM Actions</h4>
                <button onclick="generateStoryOutline()" style="background: #e74c3c; padding: 5px; font-size: 12px;">Generate AI Story Outline</button>
            </div>

            <div id="player-controls" style="margin-bottom: 15px;">
                <label style="cursor: pointer; background: #333; padding: 10px; display: block; text-align: center; border-radius: 4px;">
                    <input type="checkbox" id="ready-toggle" onchange="toggleReady()" style="display: none;">
                    <span id="ready-text">❌ Not Ready</span>
                </label>
                <button id="start-session-btn" onclick="startAiSession()" style="display:none; margin-top:10px; background: #f1c40f; color: black;">Start Session (AI)</button>
            </div>

            <h3 id="party-header" style="margin-top: 0;">Campaign Party</h3>
            <div id="char-list"></div>
        </div>
        <div id="center-panel" class="panel">
            <h2 id="map-title">Battle Map</h2>
            <canvas id="map" width="600" height="600"></canvas>
        </div>
        <div id="right-panel" class="panel">
            <h3>Communication</h3>
            <div id="chat-log"></div>
            
            <div class="dice-tray">
                <div style="font-size: 11px; color: #888; margin-bottom: 5px;">DIGITAL DICE ROLLER</div>
                <div class="dice-btn-group">
                    <button class="dice-btn" onclick="rollVttDice(20)">d20</button>
                    <button class="dice-btn" onclick="rollVttDice(12)">d12</button>
                    <button class="dice-btn" onclick="rollVttDice(10)">d10</button>
                    <button class="dice-btn" onclick="rollVttDice(8)">d8</button>
                    <button class="dice-btn" onclick="rollVttDice(6)">d6</button>
                    <button class="dice-btn" onclick="rollVttDice(4)">d4</button>
                </div>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="manual-dice" placeholder="Manual Roll (e.g., 17)" style="margin:0; flex-grow:1;">
                    <button class="dice-btn" onclick="submitManualDice()" style="margin:0; width: 60px;">Enter</button>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 5px;">
                <select id="chat-type" style="padding: 10px; background: #222; color: white; border: 1px solid #555; border-radius: 4px;"></select>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="chat-input" placeholder="Enter message or action..." onkeypress="if(event.key === 'Enter') sendChat()" style="margin:0; flex-grow:1;">
                    <button onclick="sendChat()" style="margin:0; width:80px;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCampaignId = null;
        let currentCampaignName = "";
        let myCharacter = null;
        let ws = null;
        let finalStats = {}; 
        let globalReadyStates = {};

        async function authFetch(url, options = {}) {
            const token = localStorage.getItem('vtt_token');
            if (!options.headers) options.headers = {};
            options.headers['Authorization'] = `Bearer ${token}`;
            
            const res = await fetch(url, options);
            if (res.status === 401) {
                logout(true);
                throw new Error("Unauthorized access.");
            }
            return res;
        }

        function logout(forced = false) {
            localStorage.removeItem('vtt_token');
            if (ws) { ws.close(); ws = null; }
            showScreen('auth-screen');
            const msgEl = document.getElementById('auth-msg');
            msgEl.innerText = forced ? "Session expired. Please log in again." : "Logged out successfully.";
            msgEl.style.color = forced ? "#e74c3c" : "#2ecc71";
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen, #vtt-screen').forEach(el => {
                el.classList.remove('active-screen');
                el.style.display = ''; 
            });
            document.getElementById('vtt-screen').style.display = 'none';

            if (screenId === 'vtt-screen') {
                document.getElementById('vtt-screen').style.display = 'flex';
            } else {
                document.getElementById(screenId).classList.add('active-screen');
            }
        }

        async function register() {
            const res = await fetch('/api/auth/register', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('auth-user').value, password: document.getElementById('auth-pass').value})
            });
            if (res.ok) {
                document.getElementById('auth-msg').innerText = "Registered! Now login.";
                document.getElementById('auth-msg').style.color = "#2ecc71";
            } else {
                document.getElementById('auth-msg').innerText = (await res.json()).detail || "Error";
                document.getElementById('auth-msg').style.color = "#e74c3c";
            }
        }

        async function login() {
            const formData = new URLSearchParams(); 
            formData.append('username', document.getElementById('auth-user').value); 
            formData.append('password', document.getElementById('auth-pass').value);
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: formData
            });
            if (res.ok) {
                localStorage.setItem('vtt_token', (await res.json()).access_token);
                document.getElementById('auth-msg').innerText = "";
                loadDashboard();
            } else {
                document.getElementById('auth-msg').innerText = "Invalid credentials";
                document.getElementById('auth-msg').style.color = "#e74c3c";
            }
        }

        if (localStorage.getItem('vtt_token')) loadDashboard();

        async function loadDashboard() {
            try {
                const res = await authFetch('/api/campaigns/my');
                if (res.ok) {
                    showScreen('lobby-screen');
                    const campaigns = await res.json();
                    const list = document.getElementById('dashboard-list');
                    list.innerHTML = '';
                    if (campaigns.length === 0) {
                        list.innerHTML = '<div style="color:#aaa; font-style:italic;">No campaigns yet. Create or join one!</div>';
                    }
                    campaigns.forEach(c => {
                        const codeDisp = ` <span style="font-size:10px; color:#aaa;">(Code: ${c.invite_code})</span>`;
                        const safeName = c.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        list.innerHTML += `
                            <div class="camp-list-item">
                                <div>
                                    <b>${c.name}</b>${codeDisp}<br>
                                    <span class="camp-badge">${c.role}</span>
                                </div>
                                <button onclick="enterCampaign(${c.id}, '${safeName}')" style="width: 80px; margin: 0; background: #2ecc71;">Launch</button>
                            </div>
                        `;
                    });
                }
            } catch (e) { }
        }

        async function uploadRules() {
            const fileInput = document.getElementById('rule-file');
            if (fileInput.files.length === 0) return alert("Select a file first.");
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            
            const msgEl = document.getElementById('lobby-msg');
            msgEl.style.color = "#4facfe";
            msgEl.innerText = "Processing rulebook...";
            
            const token = localStorage.getItem('vtt_token');
            const res = await fetch('/api/upload-rules', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            
            if (res.ok) {
                const data = await res.json();
                msgEl.style.color = "#2ecc71";
                msgEl.innerText = data.message;
            } else {
                msgEl.style.color = "#e74c3c";
                msgEl.innerText = "Upload failed.";
            }
        }

        async function createCampaign() {
            const name = document.getElementById('new-camp-name').value;
            const isAiDm = document.getElementById('new-camp-dm').value === 'ai';
            if(!name) return;
            try {
                const res = await authFetch('/api/campaigns', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name, ai_dm: isAiDm})
                });
                if (res.ok) {
                    const data = await res.json();
                    enterCampaign(data.id, data.name);
                }
            } catch (e) { }
        }

        async function joinCampaign() {
            const code = document.getElementById('join-camp-code').value;
            if(!code) return;
            try {
                const res = await authFetch(`/api/campaigns/join/${code}`, { method: 'POST' });
                if (res.ok) {
                    const data = await res.json();
                    enterCampaign(data.campaign_id, data.campaign_name);
                } else {
                    document.getElementById('lobby-msg').innerText = "Invalid invite code.";
                }
            } catch (e) { }
        }

        // --- CHARACTER CREATOR OVERHAUL ---
        const attributes = ['STR', 'DEX', 'CON', 'INT', 'WIS', 'CHA'];
        const standardArray = [15, 14, 13, 12, 10, 8];
        let currentGenMethod = 'std'; // std, roll, man

        function buildAttrUI() {
            const container = document.getElementById('attr-container');
            container.innerHTML = '';
            
            attributes.forEach((attr, idx) => {
                let inputHtml = '';
                if (currentGenMethod === 'std') {
                    let options = standardArray.map(val => `<option value="${val}" ${val===standardArray[idx]?'selected':''}>${val}</option>`).join('');
                    inputHtml = `<select class="attr-input" id="base-${attr}" onchange="calcStats()">${options}</select>`;
                } else if (currentGenMethod === 'roll') {
                    inputHtml = `<input type="number" class="attr-input" id="base-${attr}" value="10" readonly>`;
                } else {
                    inputHtml = `<input type="number" class="attr-input" id="base-${attr}" value="10" min="3" max="20" onchange="calcStats()">`;
                }

                container.innerHTML += `
                    <div class="attr-row">
                        <div class="attr-label">${attr}</div>
                        ${inputHtml}
                        <div style="font-size:10px; color:#888;">Base</div>
                        <div class="attr-result" id="res-${attr}">10</div>
                        <div class="attr-mod" id="mod-${attr}">+0</div>
                    </div>
                `;
            });
        }

        function setGenMethod(method) {
            currentGenMethod = method;
            document.querySelectorAll('.gen-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${method}`).classList.add('active');
            buildAttrUI();

            if (method === 'roll') {
                attributes.forEach(attr => {
                    let rolls = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1].sort((a,b)=>b-a);
                    let sum = rolls[0] + rolls[1] + rolls[2];
                    document.getElementById(`base-${attr}`).value = sum;
                });
            }
            calcStats();
        }

        function calcStats() {
            const race = document.getElementById('char-race').value;
            const charClass = document.getElementById('char-class').value;
            
            let raceBonuses = { STR: 0, DEX: 0, CON: 0, INT: 0, WIS: 0, CHA: 0 };
            if (race === 'Human') attributes.forEach(a => raceBonuses[a] = 1);
            if (race === 'Elf' || race === 'Halfling') raceBonuses['DEX'] = 2;
            if (race === 'Dwarf') raceBonuses['CON'] = 2;
            if (race === 'Orc') { raceBonuses['STR'] = 2; raceBonuses['CON'] = 1; }
            if (race === 'Dragonborn') { raceBonuses['STR'] = 2; raceBonuses['CHA'] = 1; }
            if (race === 'Tiefling') { raceBonuses['CHA'] = 2; raceBonuses['INT'] = 1; }

            let conMod = 0; let dexMod = 0;

            attributes.forEach(attr => {
                const inputEl = document.getElementById(`base-${attr}`);
                if (!inputEl) return;
                const base = parseInt(inputEl.value) || 10;
                const total = base + raceBonuses[attr];
                const mod = Math.floor((total - 10) / 2);
                const modStr = mod >= 0 ? `+${mod}` : `${mod}`;
                
                document.getElementById(`res-${attr}`).innerText = total;
                document.getElementById(`mod-${attr}`).innerText = modStr;
                
                finalStats[attr] = total;
                finalStats[`${attr}_mod`] = modStr;

                if (attr === 'CON') conMod = mod;
                if (attr === 'DEX') dexMod = mod;
            });

            let baseHp = 10; 
            if (charClass === 'Barbarian') baseHp = 12;
            if (charClass === 'Fighter' || charClass === 'Paladin' || charClass === 'Ranger') baseHp = 10;
            if (charClass === 'Bard' || charClass === 'Cleric' || charClass === 'Druid' || charClass === 'Monk' || charClass === 'Rogue' || charClass === 'Warlock') baseHp = 8;
            if (charClass === 'Sorcerer' || charClass === 'Wizard') baseHp = 6;
            
            const maxHp = baseHp + conMod;
            const ac = 10 + dexMod;

            document.getElementById('disp-hp').innerText = maxHp;
            document.getElementById('disp-ac').innerText = ac;
            document.getElementById('disp-init').innerText = dexMod >= 0 ? `+${dexMod}` : `${dexMod}`;

            finalStats.race = race;
            finalStats.char_class = charClass;
            finalStats.background = document.getElementById('char-background').value;
            finalStats.alignment = document.getElementById('char-alignment').value;
            finalStats.level = 1;
            finalStats.hp = maxHp;
            finalStats.ac = ac;
        }

        async function enterCampaign(id, name) {
            currentCampaignId = id; currentCampaignName = name;
            try {
                const res = await authFetch(`/api/campaigns/${id}/my-character`);
                if (res.ok) {
                    myCharacter = await res.json();
                    launchVTT();
                } else {
                    document.getElementById('char-msg').innerText = "";
                    showScreen('char-screen');
                    buildAttrUI();
                    calcStats(); 
                }
            } catch (e) { }
        }

        async function submitCharacter() {
            const payload = {
                name: document.getElementById('char-name').value || "Unnamed Hero",
                campaign_id: currentCampaignId,
                stats: finalStats,
                backstory: document.getElementById('char-backstory').value || "A generic adventurer."
            };
            try {
                const res = await authFetch('/api/character', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
                });
                if (res.ok) {
                    myCharacter = await res.json();
                    launchVTT();
                } else {
                    document.getElementById('char-msg').innerText = "Failed to create character.";
                }
            } catch (e) { }
        }

        async function loadChatHistory() {
            const log = document.getElementById('chat-log');
            log.innerHTML = '';
            try {
                const res = await authFetch(`/api/campaigns/${currentCampaignId}/chat-history`);
                if (res.ok) {
                    const history = await res.json();
                    history.forEach(payload => {
                        let colorClass = payload.role === 'ai' ? 'msg-ai' : (payload.role === 'user' ? 'msg-user' : 'msg-party');
                        log.innerHTML += `<div class="${colorClass}"><b>${payload.sender}:</b> ${payload.message}</div>`;
                    });
                    log.scrollTop = log.scrollHeight;
                }
            } catch (e) {}
        }

        function launchVTT() {
            document.getElementById('map-title').innerText = `Campaign: ${currentCampaignName}`;
            const chatTypeSelect = document.getElementById('chat-type');

            if (myCharacter && myCharacter.role === 'DM') {
                document.getElementById('party-header').innerText = "DM Control Panel";
                chatTypeSelect.innerHTML = `<option value="party">💬 Speak as DM</option>`;
                document.getElementById('dm-controls').style.display = 'block';
                document.getElementById('player-controls').style.display = 'none';
            } else {
                document.getElementById('party-header').innerText = "Campaign Party";
                chatTypeSelect.innerHTML = `
                    <option value="action">🎲 Take Action (Triggers AI DM)</option>
                    <option value="party">💬 Talk to Party (Chat Only)</option>
                `;
                document.getElementById('dm-controls').style.display = 'none';
                document.getElementById('player-controls').style.display = 'block';
                document.getElementById('ready-toggle').checked = false;
                document.getElementById('ready-text').innerHTML = "❌ Not Ready";
            }

            showScreen('vtt-screen');
            loadChatHistory(); 
            initWebSocket();
            loadParty();
        }

        // --- VTT DICE ROLLER ---
        function rollVttDice(sides) {
            const result = Math.floor(Math.random() * sides) + 1;
            const msg = `[Rolled 1d${sides}] Result: ${result}`;
            document.getElementById('chat-input').value = msg;
            document.getElementById('chat-type').value = "action"; // Auto set to action
        }

        function submitManualDice() {
            const val = document.getElementById('manual-dice').value;
            if(!val) return;
            const msg = `[Manual Roll Entered] Result: ${val}`;
            document.getElementById('chat-input').value = msg;
            document.getElementById('chat-type').value = "action"; // Auto set to action
            document.getElementById('manual-dice').value = '';
        }

        function toggleReady() {
            const isReady = document.getElementById('ready-toggle').checked;
            document.getElementById('ready-text').innerHTML = isReady ? "✅ Ready" : "❌ Not Ready";
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: "ready_toggle", character_name: myCharacter.name, is_ready: isReady}));
            }
        }

        async function startAiSession() {
            document.getElementById('start-session-btn').style.display = 'none';
            const msg = "We are all ready to begin! Please introduce the campaign setting and our starting situation.";
            const log = document.getElementById('chat-log');
            log.innerHTML += `<div id="typing" class="msg-ai" style="opacity: 0.5;"><i>DM is preparing the session...</i></div>`;
            log.scrollTop = log.scrollHeight;
            try {
                await authFetch('/api/chat', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ campaign_id: currentCampaignId, message: msg, character_name: "Party" })
                });
            } catch(e) {}
        }

        async function generateStoryOutline() {
            const btn = document.querySelector('#dm-controls button');
            btn.innerText = "Generating...";
            btn.disabled = true;
            try {
                await authFetch(`/api/campaigns/${currentCampaignId}/generate-outline`, { method: 'POST' });
                btn.innerText = "Outline Generated!";
            } catch(e) {
                btn.innerText = "Error Generating";
            }
            setTimeout(() => { btn.innerText = "Generate AI Story Outline"; btn.disabled = false; }, 3000);
        }

        async function loadParty() {
            try {
                const res = await authFetch(`/api/campaigns/${currentCampaignId}/characters`);
                if (!res.ok) return;
                const chars = await res.json();
                const list = document.getElementById('char-list');
                list.innerHTML = '';
                
                let allPlayersReady = true;
                let playerCount = 0;

                chars.forEach(c => {
                    const stats = typeof c.stats === 'string' ? JSON.parse(c.stats) : (c.stats || {});
                    const border = (myCharacter && c.name === myCharacter.name) ? 'border-left: 4px solid #2ecc71;' : 'border-left: 4px solid #3498db;';
                    
                    const isReady = globalReadyStates[c.name];
                    if (!isReady) allPlayersReady = false;
                    playerCount++;

                    const badgeStyle = isReady ? "display: block;" : "display: none;";

                    list.innerHTML += `
                        <div class="char-card" style="${border}">
                            <div class="ready-badge" style="${badgeStyle}">✓</div>
                            <div class="char-card-header">
                                <b style="font-size: 15px;">${c.name}</b>
                                <span style="color: #aaa;">Lvl ${stats.level || 1} ${stats.race || ''} ${stats.char_class || ''}</span>
                            </div>
                            <div style="margin-bottom: 8px; color: #fff;">
                                ❤️ ${stats.hp || 0} HP &nbsp;&nbsp;|&nbsp;&nbsp; 🛡️ ${stats.ac || 0} AC
                            </div>
                            <div class="char-card-stats">
                                <div class="stat-badge">STR: ${stats.STR || 10}</div>
                                <div class="stat-badge">DEX: ${stats.DEX || 10}</div>
                                <div class="stat-badge">CON: ${stats.CON || 10}</div>
                                <div class="stat-badge">INT: ${stats.INT || 10}</div>
                                <div class="stat-badge">WIS: ${stats.WIS || 10}</div>
                                <div class="stat-badge">CHA: ${stats.CHA || 10}</div>
                            </div>
                        </div>
                    `;
                });

                const btn = document.getElementById('start-session-btn');
                if (playerCount > 0 && allPlayersReady && myCharacter && myCharacter.role !== 'DM') {
                    btn.style.display = 'block';
                } else {
                    btn.style.display = 'none';
                }

            } catch(e) {}
        }

        const canvas = document.getElementById('map');
        const ctx = canvas.getContext('2d');
        let tokens = {}; let draggingToken = null;

        function initWebSocket() {
            if (ws) ws.close();
            const token = localStorage.getItem('vtt_token');
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/map/${currentCampaignId}?token=${token}`);
            
            ws.onmessage = (event) => {
                const payload = JSON.parse(event.data);
                
                if (payload.type === 'system' && payload.action === 'reload_party') {
                    loadParty();
                }

                if (payload.type === 'ready_update') {
                    globalReadyStates = payload.states;
                    loadParty();
                }

                if (payload.type === 'state') {
                    for (const id in payload.data) {
                        if (draggingToken !== id) tokens[id] = payload.data[id];
                    }
                    drawMap();
                }

                if (payload.type === 'chat') {
                    const log = document.getElementById('chat-log');
                    let colorClass = payload.role === 'ai' ? 'msg-ai' : (payload.role === 'user' ? 'msg-user' : 'msg-party');
                    const typingEl = document.getElementById('typing');
                    if (typingEl && payload.role === 'ai') typingEl.remove();

                    log.innerHTML += `<div class="${colorClass}"><b>${payload.sender}:</b> ${payload.message}</div>`;
                    log.scrollTop = log.scrollHeight;
                }
            };
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#333';
            for(let i = 0; i <= 600; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 600); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(600, i); ctx.stroke();
            }
            for (const [id, t] of Object.entries(tokens)) {
                ctx.beginPath(); ctx.arc(t.x, t.y, 20, 0, Math.PI * 2); ctx.fillStyle = t.color; ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#111'; ctx.textAlign = "center"; ctx.font = "12px Arial";
                ctx.fillText(id.substring(0,3).toUpperCase(), t.x, t.y + 4);
            }
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
            
            for (const [id, t] of Object.entries(tokens)) {
                if (Math.hypot(mx - t.x, my - t.y) < 20) { draggingToken = id; return; }
            }
            
            if (myCharacter && myCharacter.role === 'DM') {
                const enemyCount = Object.keys(tokens).filter(k => k.startsWith("NPC")).length + 1;
                draggingToken = `NPC-${enemyCount}`;
                tokens[draggingToken] = {x: mx, y: my, color: "#e74c3c"};
            } else if (myCharacter) {
                draggingToken = myCharacter.name;
                tokens[draggingToken] = {x: mx, y: my, color: "#3498db"};
            }
            drawMap();
        });

        canvas.addEventListener('mousemove', e => {
            if (draggingToken && ws && ws.readyState === WebSocket.OPEN) {
                const rect = canvas.getBoundingClientRect();
                tokens[draggingToken].x = e.clientX - rect.left; tokens[draggingToken].y = e.clientY - rect.top;
                drawMap();
                ws.send(JSON.stringify({type: "move", id: draggingToken, x: tokens[draggingToken].x, y: tokens[draggingToken].y}));
            }
        });

        canvas.addEventListener('mouseup', () => draggingToken = null);
        canvas.addEventListener('mouseleave', () => draggingToken = null);

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const type = document.getElementById('chat-type').value;
            const msg = input.value;
            if(!msg) return;
            input.value = '';

            if (myCharacter.role === 'DM') {
                ws.send(JSON.stringify({ type: "chat", sender: "Human DM", message: msg, role: "ai" }));
            } 
            else if (type === 'party') {
                ws.send(JSON.stringify({ type: "chat", sender: myCharacter.name, message: msg, role: "party" }));
            } 
            else if (type === 'action') {
                const log = document.getElementById('chat-log');
                log.innerHTML += `<div id="typing" class="msg-ai" style="opacity: 0.5;"><i>DM is resolving action...</i></div>`;
                log.scrollTop = log.scrollHeight;

                try {
                    await authFetch('/api/chat', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ campaign_id: currentCampaignId, message: msg, character_name: myCharacter.name })
                    });
                } catch(e) {}
            }
        }
    </script>
</body>
</html>
