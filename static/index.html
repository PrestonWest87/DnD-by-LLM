<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI VTT Engine</title>
    <link rel="stylesheet" href="/static/style.css"> 
</head>
<body>
    <div id="vtt-screen" style="display: flex;">
        <div id="left-panel">
            <button onclick="generateStoryOutline()">Generate AI Story Outline</button>
            <div id="char-list"></div>
        </div>
        
        <div id="center-panel">
            <canvas id="map" width="600" height="600"></canvas>
        </div>

        <div id="right-panel">
            <div id="chat-log"></div>
            <input type="text" id="chat-input" onkeypress="if(event.key === 'Enter') sendChat()">
        </div>
    </div>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
