<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI VTT Engine</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; margin: 0; background: #121212; color: #e0e0e0; }
        
        /* --- Screen Overlays --- */
        .screen { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; flex-direction: column; }
        .active-screen { display: flex; }
        
        /* Base Menu Box */
        .menu-box { background: #1e1e1e; padding: 30px; border-radius: 8px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .menu-box.small-box { width: 350px; }
        .menu-box.large-box { width: 500px; }
        
        /* Inputs & Buttons */
        input[type="text"], input[type="password"], input[type="number"], textarea, select { 
            width: 100%; margin-bottom: 10px; padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box;
        }
        button { width: 100%; padding: 10px; background: #4facfe; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: background 0.2s;}
        button:hover { background: #00f2fe; color: black;}

        /* --- Character Sheet Grid --- */
        .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-bottom: 15px;}
        .attr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #222; padding: 10px; border-radius: 4px; border: 1px solid #444;}
        .attr-box { text-align: center; }
        .attr-box label { display: block; font-size: 11px; color: #aaa; font-weight: bold; margin-bottom: 2px;}
        .attr-box input { text-align: center; font-size: 16px; padding: 5px; margin-bottom: 0;}
        
        /* --- VTT Layout --- */
        #vtt-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        .panel { padding: 20px; border-right: 1px solid #333; overflow-y: auto; }
        #left-panel { width: 280px; background: #1e1e1e; }
        #center-panel { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #181818; }
        #right-panel { width: 350px; background: #1e1e1e; display: flex; flex-direction: column; }
        
        canvas { background: #2b2b2b; border: 2px solid #555; cursor: grab; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        
        /* Enhanced Character Cards for Sidebar */
        .char-card { background: #2c2c2c; padding: 12px; margin-bottom: 12px; border-radius: 5px; border-left: 4px solid #3498db; font-size: 13px;}
        .char-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px;}
        .char-card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; text-align: center; font-size: 11px; color: #ccc;}
        .stat-badge { background: #111; padding: 3px; border-radius: 3px; border: 1px solid #444;}
        
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 10px; background: #000; border-radius: 5px; margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
        .msg-user { color: #4facfe; margin-bottom: 8px; }
        .msg-ai { color: #a8e6cf; margin-bottom: 8px; }
        .msg-party { color: #f1c40f; margin-bottom: 8px; font-style: italic; }
        
        .chat-controls { display: flex; flex-direction: column; gap: 5px; }
        .chat-input-row { display: flex; gap: 5px; }
        .chat-input-row input { flex-grow: 1; margin: 0;}
        .chat-input-row button { margin: 0; width: 80px;}
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active-screen">
        <div class="menu-box small-box">
            <h2>Welcome to the VTT</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="register()" style="background: #2c3e50;">Register</button>
            <div id="auth-msg" style="color: #e74c3c; margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="menu-box small-box">
            <h2>Campaign Lobby</h2>
            <hr style="border-color: #333; margin-bottom: 15px;">
            <input type="text" id="new-camp-name" placeholder="New Campaign Name">
            <button onclick="createCampaign()">Create Campaign</button>
            <hr style="border-color: #333; margin: 15px 0;">
            <input type="text" id="join-camp-code" placeholder="Invite Code (e.g., a1b2c3d4)">
            <button onclick="joinCampaign()" style="background: #27ae60;">Join Campaign</button>
            <div id="lobby-msg" style="color: #f1c40f; margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="char-screen" class="screen">
        <div class="menu-box large-box">
            <h2 style="margin-top: 0;">Forge Your Hero</h2>
            <p style="font-size: 13px; color: #aaa; margin-top: -10px; margin-bottom: 20px;">You must create a character to enter this realm.</p>
            
            <div class="sheet-grid">
                <div>
                    <label style="font-size: 12px; color: #888;">Name</label>
                    <input type="text" id="char-name" placeholder="Character Name">
                </div>
                <div>
                    <label style="font-size: 12px; color: #888;">Race</label>
                    <input type="text" id="char-race" placeholder="e.g., Elf, Dwarf, Human">
                </div>
                <div>
                    <label style="font-size: 12px; color: #888;">Class</label>
                    <input type="text" id="char-class" placeholder="e.g., Wizard, Fighter">
                </div>
                <div style="display: flex; gap: 5px;">
                    <div style="flex: 1;"><label style="font-size: 12px; color: #888;">Level</label><input type="number" id="char-lvl" value="1"></div>
                    <div style="flex: 1;"><label style="font-size: 12px; color: #888;">HP</label><input type="number" id="char-hp" value="10"></div>
                    <div style="flex: 1;"><label style="font-size: 12px; color: #888;">AC</label><input type="number" id="char-ac" value="10"></div>
                </div>
            </div>

            <label style="font-size: 12px; color: #888; display: block; text-align: left; margin-bottom: 5px;">Core Attributes</label>
            <div class="attr-grid">
                <div class="attr-box"><label>STR</label><input type="number" id="char-str" value="10"></div>
                <div class="attr-box"><label>DEX</label><input type="number" id="char-dex" value="10"></div>
                <div class="attr-box"><label>CON</label><input type="number" id="char-con" value="10"></div>
                <div class="attr-box"><label>INT</label><input type="number" id="char-int" value="10"></div>
                <div class="attr-box"><label>WIS</label><input type="number" id="char-wis" value="10"></div>
                <div class="attr-box"><label>CHA</label><input type="number" id="char-cha" value="10"></div>
            </div>

            <label style="font-size: 12px; color: #888; display: block; text-align: left; margin-top: 15px; margin-bottom: 5px;">Backstory (For the AI DM)</label>
            <textarea id="char-backstory" placeholder="Describe your background, goals, and personality..." style="height: 80px;"></textarea>
            
            <button onclick="submitCharacter()" style="margin-top: 10px;">Enter Campaign</button>
        </div>
    </div>

    <div id="vtt-screen">
        <div id="left-panel" class="panel">
            <h3>Campaign Party</h3>
            <div id="char-list"></div>
        </div>

        <div id="center-panel" class="panel">
            <h2 id="map-title">Battle Map</h2>
            <canvas id="map" width="600" height="600"></canvas>
        </div>

        <div id="right-panel" class="panel">
            <h3>Communication</h3>
            <div id="chat-log"></div>
            
            <div class="chat-controls">
                <select id="chat-type">
                    <option value="action">🎲 Take Action (Triggers DM)</option>
                    <option value="party">💬 Talk to Party (Chat Only)</option>
                </select>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" placeholder="Enter message..." onkeypress="if(event.key === 'Enter') sendChat()">
                    <button onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Global State ---
        let currentCampaignId = null;
        let currentCampaignName = "";
        let myCharacter = null;
        let ws = null;

        async function authFetch(url, options = {}) {
            const token = localStorage.getItem('vtt_token');
            if (!options.headers) options.headers = {};
            options.headers['Authorization'] = `Bearer ${token}`;
            return fetch(url, options);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen, #vtt-screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById(screenId).style.display = (screenId === 'vtt-screen') ? 'flex' : 'flex';
        }

        // --- Auth Logic ---
        async function register() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const res = await fetch('/api/auth/register', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            if (res.ok) {
                document.getElementById('auth-msg').innerText = "Registered! Now login.";
                document.getElementById('auth-msg').style.color = "#2ecc71";
            } else {
                const data = await res.json();
                document.getElementById('auth-msg').innerText = data.detail || "Error registering";
            }
        }

        async function login() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const formData = new URLSearchParams(); formData.append('username', u); formData.append('password', p);
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: formData
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('vtt_token', data.access_token);
                showScreen('lobby-screen');
            } else {
                document.getElementById('auth-msg').innerText = "Invalid credentials";
            }
        }

        if (localStorage.getItem('vtt_token')) showScreen('lobby-screen');

        // --- Campaign Lobby Logic ---
        async function createCampaign() {
            const name = document.getElementById('new-camp-name').value;
            if(!name) return;
            const res = await authFetch('/api/campaigns', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name})
            });
            const data = await res.json();
            document.getElementById('lobby-msg').innerText = `Created! Invite Code: ${data.invite_code}`;
            enterCampaign(data.id, name);
        }

        async function joinCampaign() {
            const code = document.getElementById('join-camp-code').value;
            if(!code) return;
            const res = await authFetch(`/api/campaigns/join/${code}`, { method: 'POST' });
            if (res.ok) {
                const data = await res.json();
                enterCampaign(data.campaign_id, data.campaign_name);
            } else {
                document.getElementById('lobby-msg').innerText = "Invalid invite code.";
            }
        }

        // --- Character Generation & Injection ---
        async function enterCampaign(id, name) {
            currentCampaignId = id; currentCampaignName = name;
            const res = await authFetch(`/api/campaigns/${id}/my-character`);
            if (res.ok) {
                myCharacter = await res.json();
                launchVTT();
            } else {
                showScreen('char-screen');
            }
        }

        async function submitCharacter() {
            // Pack all sheet data into the JSON stats object for the backend
            const payload = {
                name: document.getElementById('char-name').value,
                campaign_id: currentCampaignId,
                stats: {
                    race: document.getElementById('char-race').value,
                    char_class: document.getElementById('char-class').value,
                    level: parseInt(document.getElementById('char-lvl').value),
                    hp: parseInt(document.getElementById('char-hp').value),
                    ac: parseInt(document.getElementById('char-ac').value),
                    str: parseInt(document.getElementById('char-str').value),
                    dex: parseInt(document.getElementById('char-dex').value),
                    con: parseInt(document.getElementById('char-con').value),
                    int: parseInt(document.getElementById('char-int').value),
                    wis: parseInt(document.getElementById('char-wis').value),
                    cha: parseInt(document.getElementById('char-cha').value)
                },
                backstory: document.getElementById('char-backstory').value
            };

            const res = await authFetch('/api/character', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });

            if (res.ok) {
                myCharacter = await res.json();
                launchVTT();
            }
        }

        // --- VTT Initialization ---
        function launchVTT() {
            document.getElementById('map-title').innerText = `Campaign: ${currentCampaignName}`;
            showScreen('vtt-screen');
            initWebSocket();
            loadParty();
        }

        async function loadParty() {
            const res = await authFetch(`/api/campaigns/${currentCampaignId}/characters`);
            if (!res.ok) return;
            const chars = await res.json();
            const list = document.getElementById('char-list');
            list.innerHTML = '';
            
            chars.forEach(c => {
                const stats = typeof c.stats === 'string' ? JSON.parse(c.stats) : (c.stats || {});
                const border = c.name === myCharacter.name ? 'border-left: 4px solid #2ecc71;' : 'border-left: 4px solid #3498db;';
                
                // Build a rich Character Card
                list.innerHTML += `
                    <div class="char-card" style="${border}">
                        <div class="char-card-header">
                            <b style="font-size: 15px;">${c.name}</b>
                            <span style="color: #aaa;">Lvl ${stats.level || 1} ${stats.race || ''} ${stats.char_class || 'Unknown'}</span>
                        </div>
                        <div style="margin-bottom: 8px; color: #fff;">
                            ❤️ ${stats.hp || 0} HP &nbsp;&nbsp;|&nbsp;&nbsp; 🛡️ ${stats.ac || 0} AC
                        </div>
                        <div class="char-card-stats">
                            <div class="stat-badge">STR: ${stats.str || 10}</div>
                            <div class="stat-badge">DEX: ${stats.dex || 10}</div>
                            <div class="stat-badge">CON: ${stats.con || 10}</div>
                            <div class="stat-badge">INT: ${stats.int || 10}</div>
                            <div class="stat-badge">WIS: ${stats.wis || 10}</div>
                            <div class="stat-badge">CHA: ${stats.cha || 10}</div>
                        </div>
                    </div>
                `;
            });
        }

        // --- Map & WebSocket Handling ---
        const canvas = document.getElementById('map');
        const ctx = canvas.getContext('2d');
        let tokens = {};
        let draggingToken = null;

        function initWebSocket() {
            if (ws) ws.close();
            const token = localStorage.getItem('vtt_token');
            ws = new WebSocket(`ws://${window.location.host}/ws/map/${currentCampaignId}?token=${token}`);
            
            ws.onmessage = (event) => {
                const payload = JSON.parse(event.data);
                if (payload.type === 'state') {
                    for (const id in payload.data) {
                        if (draggingToken !== id) tokens[id] = payload.data[id];
                    }
                    drawMap();
                }
                if (payload.type === 'chat') {
                    const log = document.getElementById('chat-log');
                    let colorClass = payload.role === 'ai' ? 'msg-ai' : (payload.role === 'user' ? 'msg-user' : 'msg-party');
                    const typingEl = document.getElementById('typing');
                    if (typingEl && payload.role === 'ai') typingEl.remove();

                    log.innerHTML += `<div class="${colorClass}"><b>${payload.sender}:</b> ${payload.message}</div>`;
                    log.scrollTop = log.scrollHeight;
                }
            };
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#333';
            for(let i = 0; i <= 600; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 600); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(600, i); ctx.stroke();
            }
            for (const [id, t] of Object.entries(tokens)) {
                ctx.beginPath(); ctx.arc(t.x, t.y, 20, 0, Math.PI * 2); ctx.fillStyle = t.color; ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#111'; ctx.textAlign = "center"; ctx.font = "12px Arial";
                ctx.fillText(id.substring(0,3).toUpperCase(), t.x, t.y + 4);
            }
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
            for (const [id, t] of Object.entries(tokens)) {
                if (Math.hypot(mx - t.x, my - t.y) < 20) { draggingToken = id; return; }
            }
            draggingToken = myCharacter.name;
            tokens[draggingToken] = {x: mx, y: my, color: "#3498db"};
        });

        canvas.addEventListener('mousemove', e => {
            if (draggingToken && ws && ws.readyState === WebSocket.OPEN) {
                const rect = canvas.getBoundingClientRect();
                tokens[draggingToken].x = e.clientX - rect.left; tokens[draggingToken].y = e.clientY - rect.top;
                drawMap();
                ws.send(JSON.stringify({type: "move", id: draggingToken, x: tokens[draggingToken].x, y: tokens[draggingToken].y}));
            }
        });

        canvas.addEventListener('mouseup', () => draggingToken = null);
        canvas.addEventListener('mouseleave', () => draggingToken = null);

        // --- Chat Routing Logic ---
        async function sendChat() {
            const input = document.getElementById('chat-input');
            const type = document.getElementById('chat-type').value;
            const msg = input.value;
            if(!msg) return;
            input.value = '';

            if (type === 'party') {
                ws.send(JSON.stringify({ type: "chat", sender: myCharacter.name, message: msg, role: "party" }));
            } else if (type === 'action') {
                const log = document.getElementById('chat-log');
                log.innerHTML += `<div id="typing" class="msg-ai" style="opacity: 0.5;"><i>DM is consulting the rules...</i></div>`;
                log.scrollTop = log.scrollHeight;

                await authFetch('/api/chat', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ campaign_id: currentCampaignId, message: msg, character_name: myCharacter.name })
                });
            }
        }
    </script>
</body>
</html>
