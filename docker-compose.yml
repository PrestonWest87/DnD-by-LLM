services:
  web:
    build: .
    ports:
      - "8600:8600"
    volumes:
      - .:/app
      - ./data:/app/data  # Persist DB and ChromaDB locally
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - SECRET_KEY=super-secret-key-change-in-production
    extra_hosts:
      - "host.docker.internal:host-gateway"
